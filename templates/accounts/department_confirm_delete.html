{% extends 'base.html' %}
{% load static %}

{% block title %}تأكيد حذف الإدارة{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/department_confirm_delete.css' %}">
{% endblock %}

{% block content %}
<div class="delete-container">
    <div class="delete-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h2>هل أنتِ متأكدة؟</h2>
    <p>
        أنتِ على وشك حذف الإدارة/الوحدة من النظام بشكل نهائي:
        <span class="dept-name-highlight">{{ object.name }}</span>
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="delete-actions">
            <button type="submit" class="btn-confirm-delete">
                <i class="fas fa-trash-alt"></i> نعم، احذف الآن
            </button>
            <a href="{% url 'department_list' %}" class="btn-cancel">
                إلغاء الرجوع
            </a>
        </div>
    </form>
</div>
{% endblock %}
